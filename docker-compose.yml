services:
  backend:
    image: ${DOCKERHUB_USERNAME:-rajxshivam}/ai-reviews-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-reviews-backend
    restart: unless-stopped
    ports:
      - "5501:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-random-string}
    networks:
      - app-network

  frontend:
    image: ${DOCKERHUB_USERNAME:-rajxshivam}/ai-reviews-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-reviews-frontend
    restart: unless-stopped
    ports:
      - "5500:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
