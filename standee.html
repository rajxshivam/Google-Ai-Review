<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Restro Standee</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Montserrat:wght@500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #161b22;
            --bg-darker: #0d1117;
            --gold-primary: #d4af37;
            --gold-light: #f3e5ab;
            --gold-dark: #aa8529;
            --text-gray: #a0aab5;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #e5e5e5;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
        }

        /* Main Standee Container (5:7 Aspect Ratio) */
        .standee-container {
            width: 350px;
            height: 490px;
            background: linear-gradient(145deg, var(--bg-dark), var(--bg-darker));
            border-radius: 16px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
            box-sizing: border-box;
            border: 3px solid var(--gold-primary);
            box-shadow:
                inset 0 0 10px rgba(0, 0, 0, 0.5),
                0 20px 40px rgba(0, 0, 0, 0.3);
            z-index: 2;
        }

        /* Decorative Elements */
        .dots {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 20px;
            height: 40px;
            background-image: radial-gradient(var(--text-gray) 1px, transparent 1px);
            background-size: 6px 6px;
            opacity: 0.5;
        }

        .diamonds {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 15px;
            height: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            opacity: 0.6;
        }

        .diamonds.left {
            left: 15px;
        }

        .diamonds.right {
            right: 15px;
        }

        .diamond {
            width: 8px;
            height: 8px;
            border: 1px solid var(--gold-primary);
            transform: rotate(45deg);
            margin: 2px auto;
        }

        /* Top Logo (Meta) */
        .top-logo {
            width: 40px;
            height: auto;
            margin-bottom: 20px;
        }

        /* Title section */
        .title {
            font-family: 'Playfair Display', serif;
            color: var(--gold-primary);
            font-size: 32px;
            margin: 0 0 15px 0;
            text-align: center;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .divider {
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
            margin-bottom: 20px;
        }

        .subtitle {
            color: var(--gold-light);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0 0 25px 0;
            font-weight: 600;
        }

        /* QR Code Section */
        .qr-wrapper {
            background: #fdfdfd;
            padding: 12px;
            border-radius: 12px;
            border: 3px solid var(--gold-primary);
            position: relative;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.25);
            /* Gold glow */
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .qr-image {
            width: 160px;
            height: 160px;
            display: block;
        }

        .qr-center-icon {
            position: absolute;
            background: white;
            border-radius: 50%;
            padding: 4px;
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .qr-center-icon img {
            width: 100%;
            height: auto;
        }

        /* Footer Text */
        .footer-text {
            color: var(--gold-dark);
            font-size: 8px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            position: absolute;
            bottom: 18px;
            font-weight: 600;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="base-wrapper">
        <div class="standee-container">
            <div class="dots"></div>
            <div class="diamonds left">
                <div class="diamond"></div>
                <div class="diamond"></div>
                <div class="diamond"></div>
            </div>
            <div class="diamonds right">
                <div class="diamond"></div>
                <div class="diamond"></div>
                <div class="diamond"></div>
            </div>

            <svg class="top-logo" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M25.5 12C23.0145 12 20.916 13.4355 19.827 15.534C19.1685 14.2695 17.8425 13.5 16.5 13.5C14.0145 13.5 12 15.5145 12 18C12 20.4855 14.0145 22.5 16.5 22.5C17.8425 22.5 19.1685 21.7305 19.827 20.466C20.916 22.5645 23.0145 24 25.5 24C28.8135 24 31.5 21.3135 31.5 18C31.5 14.6865 28.8135 12 25.5 12ZM16.5 20.25C15.258 20.25 14.25 19.242 14.25 18C14.25 16.758 15.258 15.75 16.5 15.75C17.742 15.75 18.75 16.758 18.75 18C18.75 19.242 17.742 20.25 16.5 20.25ZM25.5 21.75C23.43 21.75 21.75 20.07 21.75 18C21.75 15.93 23.43 14.25 25.5 14.25C27.57 14.25 29.25 15.93 29.25 18C29.25 20.07 27.57 21.75 25.5 21.75Z"
                    fill="#0064E0" />
            </svg>

            <h1 class="title">Shivam Nextgen</h1>
            <div class="divider"></div>
            <p class="subtitle">REVIEW US ON GOOGLE</p>

            <div class="qr-wrapper">
                <img class="qr-image"
                    src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://g.page/r/example/review"
                    alt="QR Code">

                <div class="qr-center-icon">
                    <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M25.5 12C23.0145 12 20.916 13.4355 19.827 15.534C19.1685 14.2695 17.8425 13.5 16.5 13.5C14.0145 13.5 12 15.5145 12 18C12 20.4855 14.0145 22.5 16.5 22.5C17.8425 22.5 19.1685 21.7305 19.827 20.466C20.916 22.5645 23.0145 24 25.5 24C28.8135 24 31.5 21.3135 31.5 18C31.5 14.6865 28.8135 12 25.5 12ZM16.5 20.25C15.258 20.25 14.25 19.242 14.25 18C14.25 16.758 15.258 15.75 16.5 15.75C17.742 15.75 18.75 16.758 18.75 18C18.75 19.242 17.742 20.25 16.5 20.25ZM25.5 21.75C23.43 21.75 21.75 20.07 21.75 18C21.75 15.93 23.43 14.25 25.5 14.25C27.57 14.25 29.25 15.93 29.25 18C29.25 20.07 27.57 21.75 25.5 21.75Z"
                            fill="#0064E0" />
                    </svg>
                </div>
            </div>

            <p class="footer-text">POWERED BY<br><span style="color: var(--gold-primary); font-size: 13px; font-weight: 700; display: block; margin-top: 3px; letter-spacing: 2px;">SHIVAM NEXTGEN</span></p>
        </div>


    </div>

</body>

</html>
